<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>스페인어 PWA 테스트</title>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#fff8ed;color:#1f2937;padding:24px;line-height:1.6}
.card{max-width:720px;margin:auto;background:white;border:1px solid #f1dcc0;border-radius:22px;padding:22px}
.ok{color:#0f766e;font-weight:900}
.bad{color:#b91c1c;font-weight:900}
button{font-size:18px;border:0;border-radius:14px;background:#c71920;color:white;padding:12px 16px}
pre{white-space:pre-wrap;background:#fff7ed;border-radius:14px;padding:14px}
</style>
</head>
<body>
<div class="card">
<h1>스페인어 30일 PWA 테스트</h1>
<p id="result">테스트 중...</p>
<button onclick="location.href='./index.html'">앱 열기</button>
<pre id="detail"></pre>
</div>
<script src="data.js"></script>
<script>
const checks = [];
checks.push(["DAYS 30일", Array.isArray(DAYS) && DAYS.length === 30]);
checks.push(["Day별 단어 24개", DAYS.every(d => d.words && d.words.length === 24)]);
const words = DAYS.flatMap(d => d.words.map(w => w.word));
checks.push(["총 단어 720개", words.length === 720]);
checks.push(["중복 단어 없음", new Set(words.map(w => w.toLowerCase())).size === words.length]);
checks.push(["숫자 접미사 없음", !words.some(w => /\s+\d+$/.test(w)));
checks.push(["문법 30개", Object.keys(GRAMMAR).length === 30]);
checks.push(["회화 30일", Object.keys(DIALOGUES).length === 30]);
checks.push(["회화 하루 5문장", Object.values(DIALOGUES).every(v => v.length === 5)]);
const ok = checks.every(c => c[1]);
document.getElementById("result").innerHTML = ok ? '<span class="ok">정상입니다.</span>' : '<span class="bad">확인이 필요한 항목이 있습니다.</span>';
document.getElementById("detail").textContent = checks.map(c => `${c[1] ? "✅" : "❌"} ${c[0]}`).join("\n");
</script>
</body>
</html>
